<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aplikasi Pendaftaran</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1a1a2e">

  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-muted: #a0a0b5;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent; /* Buang kotak biru bila tekan di telefon */
    }

    /* 1. APP HEADER (Melekat di Atas) */
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      padding-top: env(safe-area-inset-top, 20px); /* Untuk takuk/notch iPhone */
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      z-index: 100;
    }

    /* 2. KAWASAN KANDUNGAN */
    .content-area {
      padding: 100px 20px 120px 20px; /* Ruang untuk Header & Bottom Nav */
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Kad Borang Glassmorphism */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 25px 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .form-title {
      margin: 0 0 20px 0;
      font-size: 1.1rem;
      color: #4facfe;
      text-transform: uppercase;
      font-weight: 800;
    }

    .input-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      font-size: 16px; /* Saiz standard mobile */
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s ease;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.3); }
    input:focus { border-color: #4facfe; background: rgba(255, 255, 255, 0.05); }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 12px;
      background: var(--primary-gradient);
      color: #fff;
      font-weight: bold;
      font-size: 1.1rem;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
      transition: transform 0.2s;
    }

    button:active { transform: scale(0.96); }
    .loading { opacity: 0.7; pointer-events: none; }
    
    #statusMessage { 
      margin-top: 15px; 
      font-size: 0.95rem; 
      text-align: center; 
      min-height: 1.5rem; 
      font-weight: 600; 
    }

    /* 3. BOTTOM NAVIGATION (Melekat di Bawah) */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-around;
      padding: 15px 0;
      padding-bottom: env(safe-area-inset-bottom, 15px); /* Untuk iPhone home indicator */
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .nav-item.active { color: #4facfe; }
    .nav-icon { font-size: 1.4rem; margin-bottom: 4px; }
  </style>
</head>
<body>

  <div class="app-header">
    SISTEM DAFTAR
  </div>

  <div class="content-area">
    <div class="glass-card">
      <h3 class="form-title">Maklumat Peserta</h3>
      
      <form id="mainForm">
        <div class="input-group">
          <label for="nama">Nama Penuh</label>
          <input type="text" id="nama" placeholder="Masukkan nama anda" required>
        </div>
        
        <div class="input-group">
          <label for="emel">Alamat Emel</label>
          <input type="email" id="emel" placeholder="contoh@emel.com" required>
        </div>
        
        <button type="submit" id="submitBtn">HANTAR SEKARANG</button>
        <div id="statusMessage"></div>
      </form>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active">
      <span class="nav-icon">⌂</span>
      <span>Utama</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📋</span>
      <span>Rekod</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span>Tetapan</span>
    </div>
  </div>

  <script>
    // PASTIKAN URL GAS ANDA DI SINI
    const scriptURL = 'TAMPAL_URL_WEB_APP_GAS_ANDA_DI_SINI';
    const form = document.getElementById('mainForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('statusMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      btn.innerText = 'MEMPROSES...';
      btn.classList.add('loading');
      status.innerText = '';

      const formData = {
        nama: document.getElementById('nama').value,
        emel: document.getElementById('emel').value
      };

      try {
        const response = await fetch(scriptURL, {
          method: 'POST',
          mode: 'no-cors', 
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(formData)
        });

        status.style.color = '#4facfe'; // Biru terang 
        status.innerText = '✓ Data berjaya disimpan!';
        form.reset();

      } catch (error) {
        console.error('Ralat:', error);
        status.style.color = '#ff4b4b'; // Merah amaran
        status.innerText = '✗ Gagal menyambung ke pelayan.';
      } finally {
        btn.innerText = 'HANTAR SEKARANG';
        btn.classList.remove('loading');
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Aktif!', reg.scope))
          .catch(err => console.error('SW Gagal:', err));
      });
    }
  </script>
</body>
</html>
